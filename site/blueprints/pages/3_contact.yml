title: Kontakt

image:
  icon: pen
  back: red

sections:
  tags:
    type: fields
    fields:
      statementSticker:
        label: Text Statement-Box-link
        type: text
        buttons: false
        maxlength: 70
        help: Wenn dieser Text entfernt wird, wird die Box und somit der Link ausgeblendet. Falls das Statement runtergenommen werden soll
      statementPDF:
        label: Statement PDF
        type: files
        layout: list
        multiple: false
        accept:
          - application/pdf
      newsletterDataSecurity:
        label: Newsletter Mail Info
        type: text
        required: true
        buttons: false
      newsletterConfirmed:
        label: Newsletter Bestätigungs Text
        type: text
        required: true
        buttons: false
      contactTitle:
        label: Titel Kontakt
        type: text
        required: true
        buttons: false
      vereinTitle:
        label: Titel Verein
        type: text
        required: true
        buttons: false
      contactVereinText:
        label: Verein Text / Adresse
        type: textarea
        required: true
        buttons:
          - italic
          - link