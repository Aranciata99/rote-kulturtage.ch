image:
  icon: question
  back: black

columns:
  - width: 1/5
    sections:
      cover: 
        type: fields
        fields:
          bild:
            label: Cover Bild
            type: files
            layout: cards
            multiple: false
            image:
              ratio: 1/1
              cover: true
            help:
          copyright:
            label: Bild Copyright
            type: text
            help: ohne © Smbol schreiben!
            placeholder: Name Nachname, jahr
  - width: 2/5
    sections:
      veranstaltungDetails: 
        type: fields
        fields:
          von:
            label: Von
            type: time
            display: HH:mm
            width: 1/2
            required: true
          bis:
            label: Bis
            type: time
            display: HH:mm
            width: 1/2
            required: true
          location:
            label: Location
            type: text
            width: 1/1
            required: true
            placeholder: z.B. Volkshaus, Weisser Saal
          locationLink:
            label: Location Link
            type: url
            width: 1/1
            help: Google Maps Link hier einfügen
          tags:
            label: Tags / Art der Veranstaltung
            type: tags
            options:
              - Performatives
              - Musik
              - Film
              - Theorie
              - Sport
              - Kinderprogramm
              - Weiteres
            required: true
  - width: 2/5
    sections:
      veranstaltungsInfo: 
        type: fields
        fields:
          veranstaltungsDetails:
            label: Details (Sprache, Länge, etc.)
            type: textarea
            buttons: false
            placeholder: z.B. Sprache; Englisch
          details:
            label: Details
            type: textarea
            placeholder: Veranstaltungstext
            buttons:
              - bold
              - italic
              - '|'
              - ul
              - ol